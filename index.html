<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Links - VacuoStore</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background-color: #f9f9f9;
      color: #333;
    }
    margin: 0; /* remove margens padrão */
    }
    .topo {
      height: 10px; /* altura da parte superior */
      background-color: #3498db; /* azul */
    }
    .baixo {
      min-height: 150px; /* altura mínima da parte inferior */
      background-color: #2ecc71; /* verde */
    }
    h2 {
      margin: 25px; /* Aplicar 10px de margem em todos os lados */
      color: #444;
    }
    input, select, button {
      margin: 5px 0;
      padding: 8px 12px;
      font-size: 14px;
    }
    input, select {
      width: 300px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background-color: #0078d7;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #005a9e;
    }
    #resultado {
      margin-top: 15px;
      font-weight: bold;
    }
    #feedback {
      margin-top: 10px;
      font-weight: bold;
    }
    .success { color: green; }
    .error { color: red; }
    .color-editor {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
    }
    .color-editor label {
      display: block;
      margin: 5px 0;
    }
  </style>
</head>
<body>
   <div class="topo">
    <!-- Conteúdo da parte superior -->
  </div>
  <div class="baixo">
    <!-- Conteúdo da parte inferior -->
  </div>
  <h2>Adicionar Produto</h2>
  <input id="nomeProduto" placeholder="Nome curto">
  <input id="urlProduto" placeholder="URL completa">
  <button onclick="adicionarProduto()">Adicionar Produto</button>

  <h2>Adicionar Origem</h2>
  <input id="novaOrigem" placeholder="Nome da origem">
  <button onclick="adicionarOrigem()">Adicionar Origem</button>

  <h2>Gerar Link</h2>
  <select id="produto"></select>
  <select id="src"></select>
  <button onclick="gerarLink()">Gerar Link</button>

  <div id="resultado"></div>
  <div id="abrirLink"></div>
  <div id="copiarLink"></div>
  <div id="feedback"></div>

  <h2>Exportar CSV</h2>
  <button onclick="exportarCSV()">Exportar Dados</button>

  <h2>Resetar Planilha</h2>
  <button onclick="resetarPlanilha()">Resetar</button>

  <h2>Editor de Cores e Fontes</h2>
  <div class="color-editor">
    <label>Cor de fundo: <input type="color" id="bgColor" value="#f9f9f9"></label>
    <label>Cor dos botões: <input type="color" id="btnColor" value="#0078d7"></label>
    <label>Cor da fonte geral: <input type="color" id="fontColor" value="#333333"></label>
    <label>Cor dos títulos: <input type="color" id="titleColor" value="#444444"></label>
    <label>Fonte do site: 
      <select id="fontFamily">
        <option value="Arial">Arial</option>
        <option value="Verdana">Verdana</option>
        <option value="Tahoma">Tahoma</option>
        <option value="Georgia">Georgia</option>
        <option value="Courier New">Courier New</option>
        <option value="Times New Roman">Times New Roman</option>
      </select>
    </label>
    <button onclick="aplicarCores()">Aplicar Estilo</button>
  </div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyaxGYOi3Orwe6EFcxVJfp1a4Nu8b2_Adh3D84OGxhIQ1_pnEZP0VzbaubTTuOKwsVc/exec";

function mostrarFeedback(msg, tipo="success") {
  const feedback = document.getElementById("feedback");
  feedback.className = tipo;
  feedback.innerText = msg;
  setTimeout(() => feedback.innerText = "", 3000);
}

function adicionarProduto() {
  const nome = document.getElementById("nomeProduto").value;
  const url = document.getElementById("urlProduto").value;
  fetch(`${WEBAPP_URL}?acao=adicionarProduto&nome=${encodeURIComponent(nome)}&url=${encodeURIComponent(url)}`)
    .then(r => r.text())
    .then(msg => {
      mostrarFeedback("✔ " + msg, "success");
      carregarProdutos();
    })
    .catch(() => mostrarFeedback("Erro ao adicionar produto", "error"));
}

function adicionarOrigem() {
  const origem = document.getElementById("novaOrigem").value;
  fetch(`${WEBAPP_URL}?acao=adicionarOrigem&origem=${encodeURIComponent(origem)}`)
    .then(r => r.text())
    .then(msg => {
      mostrarFeedback("✔ " + msg, "success");
      carregarOrigens();
    })
    .catch(() => mostrarFeedback("Erro ao adicionar origem", "error"));
}

function carregarProdutos() {
  fetch(`${WEBAPP_URL}?acao=listarProdutos`)
    .then(r => r.json())
    .then(lista => {
      const select = document.getElementById("produto");
      select.innerHTML = "";
      lista.forEach(row => {
        if (row[0] && row[1]) {
          const opt = document.createElement("option");
          opt.value = row[1];
          opt.textContent = row[0];
          select.appendChild(opt);
        }
      });
    });
}

function carregarOrigens() {
  fetch(`${WEBAPP_URL}?acao=listarOrigens`)
    .then(r => r.json())
    .then(lista => {
      const select = document.getElementById("src");
      select.innerHTML = "";
      lista.forEach(row => {
        if (row[0]) {
          const opt = document.createElement("option");
          opt.value = row[0];
          opt.textContent = row[0];
          select.appendChild(opt);
        }
      });
    });
}

function gerarLink() {
  const produtoUrl = document.getElementById("produto").value;
  const src = document.getElementById("src").value;
  const link = `${produtoUrl}?src=${src}`;
  document.getElementById("resultado").innerText = "Link gerado: " + link;

  const abrirDiv = document.getElementById("abrirLink");
  abrirDiv.innerHTML = "";
  const btnAbrir = document.createElement("button");
  btnAbrir.innerText = "Abrir Produto";
  btnAbrir.onclick = () => window.open(link, "_blank");
  abrirDiv.appendChild(btnAbrir);

  const copiarDiv = document.getElementById("copiarLink");
  copiarDiv.innerHTML = "";
  const btnCopiar = document.createElement("button");
  btnCopiar.innerText = "Copiar Link";
  btnCopiar.onclick = () => {
    navigator.clipboard.writeText(link).then(() => {
      mostrarFeedback("✔ Link copiado com sucesso!", "success");
    });
  };
  copiarDiv.appendChild(btnCopiar);
}

function exportarCSV() {
  fetch(`${WEBAPP_URL}?acao=exportarCSV`)
    .then(r => r.text())
    .then(csv => {
      const blob = new Blob([csv], { type: "text/csv" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "dados.csv";
      a.click();
      URL.revokeObjectURL(url);
      mostrarFeedback("✔ CSV exportado com sucesso!", "success");
    })
    .catch(() => mostrarFeedback("Erro ao exportar CSV", "error"));
}

function resetarPlanilha() {
  fetch(`${WEBAPP_URL}?acao=resetarPlanilha`)
    .then(r => r.text())
    .then(msg => {
      mostrarFeedback("✔ " + msg, "success");
      carregarProdutos();
      carregarOrigens();
    })
    .catch(() => mostrarFeedback("Erro ao resetar planilha", "error"));
}

function aplicarCores() {
  const bg = document.getElementById("bgColor").value;
  const btn = document.getElementById("btnColor").value;
  const font = document.getElementById("fontColor").value;
  const title = document.getElementById("titleColor").value;
  const fontFamily = document.getElementById("fontFamily").value;

  document.body.style.backgroundColor = bg;
  document.body.style.color = font;

  document.querySelectorAll("button").forEach(b => {
    b.style.backgroundColor = btn;
    b.style.color = "#fff";
  });

  // salvar no localStorage
  localStorage.setItem("bgColor", bg);
  localStorage.setItem("btnColor", btn);
  localStorage.setItem("fontColor", font);
}

// reaplica ao carregar
window.onload = function() {
  carregarProdutos();
  carregarOrigens();

  const bg = localStorage.getItem("bgColor");
  const btn = localStorage.getItem("btnColor");
  const font = localStorage.getItem("fontColor");

  if (bg && btn && font) {
    document.getElementById("bgColor").value = bg;
    document.getElementById("btnColor").value = btn;
    document.getElementById("fontColor").value = font;
    aplicarCores();
  }
};
</script>
</body>
</html>
